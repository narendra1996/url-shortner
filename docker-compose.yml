version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: url-shortner-db
    environment:
      POSTGRES_DB: urldb
      POSTGRES_USER: shortner
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: url-shortner-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
